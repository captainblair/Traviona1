name: Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: traviona
          POSTGRES_USER: traviona
          POSTGRES_PASSWORD: traviona
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U traviona -d traviona"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: backend

    env:
      DEBUG: "False"
      SECRET_KEY: ci-secret-key
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://traviona:traviona@localhost:5432/traviona
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      CACHE_URL: locmemcache://traviona-ci
      FRONTEND_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run checks
        run: python manage.py check

      - name: Run tests
        run: python manage.py test
